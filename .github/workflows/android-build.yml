name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Rust Android targets
      run: |
        rustup target add aarch64-linux-android
        # Add other Android targets if needed
        rustup target add armv7-linux-androideabi
        rustup target add i686-linux-android

    - name: Configure AndroidX
      run: |
        cd android
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.parallel=true
        org.gradle.jvmargs=-Xmx4g
        org.gradle.warning.mode=none
        EOF
    
        echo "=== gradle.properties content ==="
        cat gradle.properties

        
    - name: Build Rust library with cargo-ndk
      run: |
        # Install cargo-ndk for easier Android builds
        cargo install cargo-ndk
        cargo ndk -t arm64-v8a build --release
        
        # Copy the built library
        mkdir -p android/app/src/main/jniLibs/arm64-v8a/
        cp target/aarch64-linux-android/release/libaudiovisualizer.so android/app/src/main/jniLibs/arm64-v8a/
        
    - name: Build Android APK
      run: |
        cd android
    
        # Just try the basic build command
        ./gradlew build
    
    - name: Find and Upload APK
      run: |
        cd android
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f
    
        # Copy any found APK to root for easy upload
        find . -name "*.apk" -type f -exec cp {} . \;
        ls -la *.apk || echo "No APK in root, but check app/build/outputs/"
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: audiovisualizer-apk
        path: |
          android/*.apk
          android/app/build/outputs/apk/**/*.apk
