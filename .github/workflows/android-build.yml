name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Rust Android targets
      run: |
        rustup target add aarch64-linux-android
        # Add other Android targets if needed
        rustup target add armv7-linux-androideabi
        rustup target add i686-linux-android
        
    - name: Build Rust library with cargo-ndk
      run: |
        # Install cargo-ndk for easier Android builds
        cargo install cargo-ndk
        cargo ndk -t arm64-v8a build --release
        
        # Copy the built library
        mkdir -p android/app/src/main/jniLibs/arm64-v8a/
        cp target/aarch64-linux-android/release/libaudiovisualizer.so android/app/src/main/jniLibs/arm64-v8a/

    - name: Debug Android Project Structure
      run: |
        cd android
        echo "=== Current Directory ==="
        pwd
        ls -la
    
        echo "=== Gradle Files ==="
        find . -name "*.gradle" -type f
    
        echo "=== Settings.gradle content ==="
        cat settings.gradle 2>/dev/null || cat settings.gradle.kts 2>/dev/null || echo "No settings file found"
    
        echo "=== Available projects ==="
        ./gradlew projects --no-daemon
            
    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew tasks --all | grep assemble || echo "No assemble tasks found"
        ./gradlew projects
        ./gradlew :app:assembleDebug
            
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: audiovisualizer-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
