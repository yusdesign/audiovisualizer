name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Rust and Android target
      run: |
        rustup target add aarch64-linux-android
        
    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: "25c"

    - name: Build Rust Library
      run: |
        cargo build --release --target aarch64-linux-android
        mkdir -p android/app/src/main/jniLibs/arm64-v8a/
        cp target/aarch64-linux-android/release/libaudiovisualizer.so android/app/src/main/jniLibs/arm64-v8a/
        
    - name: Build Android APK
      run: |
        cd audiovisualizer/android
        chmod +x gradlew
        ./gradlew assembleDebug
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: audiovisualizer-apk
        path: audiovisualizer/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
