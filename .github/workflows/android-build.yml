name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Rust Android targets
      run: |
        rustup target add aarch64-linux-android
        # Add other Android targets if needed
        rustup target add armv7-linux-androideabi
        rustup target add i686-linux-android

    - name: Configure AndroidX
      run: |
        cd android
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.parallel=true
        org.gradle.jvmargs=-Xmx4g
        org.gradle.warning.mode=none
        EOF
    
        echo "=== gradle.properties content ==="
        cat gradle.properties

    - name: Fix AndroidManifest.xml
      run: |
        cd android/app/src/main
        # Remove the package attribute from AndroidManifest.xml
        sed -i 's/package="[^"]*"//' AndroidManifest.xml
        echo "=== Updated AndroidManifest.xml ==="
        cat AndroidManifest.xml | head -10

    - name: Add Default Launcher Icons
      run: |
        cd android/app/src/main
        mkdir -p res/mipmap-hdpi res/mipmap-mdpi res/mipmap-xhdpi res/mipmap-xxhdpi res/mipmap-xxxhdpi
    
        # Create a simple placeholder icon (you can replace later)
        echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > res/mipmap-anydpi-v26/ic_launcher.xml
        echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\">" >> res/mipmap-anydpi-v26/ic_launcher.xml
        echo "    <background android:drawable=\"@color/ic_launcher_background\"/>" >> res/mipmap-anydpi-v26/ic_launcher.xml
        echo "    <foreground android:drawable=\"@mipmap/ic_launcher_foreground\"/>" >> res/mipmap-anydpi-v26/ic_launcher.xml
        echo "</adaptive-icon>" >> res/mipmap-anydpi-v26/ic_launcher.xml
    
        # Create foreground
        echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > res/mipmap-anydpi-v26/ic_launcher_foreground.xml
        echo "<vector xmlns:android=\"http://schemas.android.com/apk/res/android\"" >> res/mipmap-anydpi-v26/ic_launcher_foreground.xml
        echo "    android:width=\"108dp\" android:height=\"108dp\" android:viewportWidth=\"108\" android:viewportHeight=\"108\">" >> res/mipmap-anydpi-v26/ic_launcher_foreground.xml
        echo "    <path android:fillColor=\"#3DDC84\" android:pathData=\"M0,0h108v108h-108z\"/>" >> res/mipmap-anydpi-v26/ic_launcher_foreground.xml
        echo "    <path android:fillColor=\"#FFFFFF\" android:pathData=\"M44,44h20v20h-20z\"/>" >> res/mipmap-anydpi-v26/ic_launcher_foreground.xml
        echo "</vector>" >> res/mipmap-anydpi-v26/ic_launcher_foreground.xml
    
        # Create background color
        mkdir -p res/values
        echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > res/values/colors.xml
        echo "<resources>" >> res/values/colors.xml
        echo "    <color name=\"ic_launcher_background\">#FFFFFF</color>" >> res/values/colors.xml
        echo "</resources>" >> res/values/colors.xml
    
        echo "=== Created icon resources ==="
        find res/mipmap* res/values -type f

        
    - name: Build Rust library with cargo-ndk
      run: |
        # Install cargo-ndk for easier Android builds
        cargo install cargo-ndk
        cargo ndk -t arm64-v8a build --release
        
        # Copy the built library
        mkdir -p android/app/src/main/jniLibs/arm64-v8a/
        cp target/aarch64-linux-android/release/libaudiovisualizer.so android/app/src/main/jniLibs/arm64-v8a/
        
    - name: Build Android APK
      run: |
        cd android
    
        # Just try the basic build command
        ./gradlew build
    
    - name: Find and Upload APK
      run: |
        cd android
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f
    
        # Copy any found APK to root for easy upload
        find . -name "*.apk" -type f -exec cp {} . \;
        ls -la *.apk || echo "No APK in root, but check app/build/outputs/"
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: audiovisualizer-apk
        path: |
          android/*.apk
          android/app/build/outputs/apk/**/*.apk
